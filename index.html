<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amblock — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#060910;
    --bg-deep:#03050a;
    --ice:#eef6ff;
    --frost:#7fd6ff;
    --frost-2:#3d9fdb;
    --frost-deep:#184d78;
    --mist:#93a7bf;
    --mist-dim:#465468;
    --line:#182234;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--bg-deep);
    color:var(--ice);
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
    min-height:100vh;
    position:relative;
    cursor:default;
  }
  ::selection{background:var(--frost);color:#04101f;}
  a:focus-visible, .avatar-ring:focus-visible{outline:2px solid var(--frost);outline-offset:4px;border-radius:8px;}

  /* ambient layers */
  #fx-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}

  .vignette{
    position:fixed;inset:0;z-index:2;pointer-events:none;
    background:
      radial-gradient(ellipse 70% 60% at 50% 38%, transparent 0%, rgba(3,5,10,0.0) 40%, rgba(3,5,10,0.75) 100%);
  }
  .base-glow{
    position:fixed;top:-10%;left:50%;
    width:1100px;height:900px;margin-left:-550px;
    background:radial-gradient(circle, rgba(63,159,219,0.16) 0%, transparent 65%);
    z-index:0;pointer-events:none;
    will-change:transform;
  }
  .impact-flash{
    position:fixed;top:50%;left:50%;width:10px;height:10px;
    transform:translate(-50%,-50%);border-radius:50%;
    background:radial-gradient(circle, rgba(238,246,255,0.9) 0%, rgba(127,214,255,0.4) 35%, transparent 70%);
    z-index:60;pointer-events:none;opacity:0;
  }
  .impact-flash.go{
    animation:flash-pulse 0.9s cubic-bezier(.16,1,.3,1) forwards;
  }
  @keyframes flash-pulse{
    0%{opacity:0;transform:translate(-50%,-50%) scale(0);}
    35%{opacity:0.85;}
    100%{opacity:0;transform:translate(-50%,-50%) scale(140);}
  }
  .grain{
    position:fixed;inset:0;z-index:3;pointer-events:none;opacity:0.05;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  .stage{
    position:relative;z-index:4;
    min-height:100vh;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    padding:56px 24px;
  }

  /* frost crack signature, sits behind the avatar */
  .frost-svg{
    position:absolute;
    top:50%;left:50%;
    width:min(920px,150vw);
    transform:translate(-50%,-52%);
    z-index:0;
    pointer-events:none;
    opacity:0.85;
    will-change:transform;
  }
  .frost-svg path{
    fill:none;
    stroke:var(--frost);
    stroke-width:1.1;
    stroke-linecap:round;
    filter:drop-shadow(0 0 6px rgba(127,214,255,0.55));
    stroke-dasharray:1;
    stroke-dashoffset:1;
    animation:crack-draw 1.8s cubic-bezier(.16,1,.3,1) forwards;
    pathLength: 1;
  }
  @keyframes crack-draw{ to{stroke-dashoffset:0;} }

  .content{
    position:relative;z-index:2;
    display:flex;flex-direction:column;align-items:center;text-align:center;
    max-width:720px;width:100%;
    perspective:900px;
  }

  .avatar-ring{
    position:relative;
    width:132px;height:132px;
    margin-bottom:30px;
    opacity:0;transform:translateY(10px) scale(.94);
    animation:rise .8s cubic-bezier(.16,1,.3,1) .15s forwards, float 4.5s ease-in-out 1.2s infinite;
    transition:transform .15s ease-out;
    transform-style:preserve-3d;
    cursor:pointer;
  }
  @keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-7px);}
  }
  .avatar-ring::before{
    content:"";position:absolute;inset:-10px;border-radius:50%;
    background:conic-gradient(from 0deg, var(--frost), transparent 30%, transparent 70%, var(--frost));
    animation:spin 7s linear infinite;
    opacity:0.75;
    filter:blur(1px);
  }
  .avatar-ring::after{
    content:"";position:absolute;inset:-22px;border-radius:50%;
    background:radial-gradient(circle, rgba(127,214,255,0.28) 0%, transparent 70%);
    z-index:-1;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .avatar-mask{
    position:absolute;inset:5px;
    border-radius:50%;
    overflow:hidden;
    border:2px solid var(--bg-deep);
    background:var(--bg-deep);
  }
  .avatar-mask img{width:100%;height:100%;object-fit:cover;display:block;}

  .status{
    font-family:'JetBrains Mono',monospace;font-size:11.5px;letter-spacing:2.5px;
    color:var(--frost);text-transform:uppercase;
    display:flex;align-items:center;gap:9px;margin-bottom:22px;
    opacity:0;transform:translateY(10px);
    animation:rise .8s cubic-bezier(.16,1,.3,1) .32s forwards;
  }
  .status .pip{width:6px;height:6px;border-radius:50%;background:var(--frost);box-shadow:0 0 10px var(--frost);animation:pulse 2.4s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

  .wordmark{
    font-family:'JetBrains Mono',monospace;font-weight:600;font-size:15px;
    letter-spacing:5px;color:var(--mist);margin-bottom:6px;
    opacity:0;transform:translateY(10px);
    animation:rise .8s cubic-bezier(.16,1,.3,1) .4s forwards;
  }

  .headline{
    font-family:'Space Grotesk',sans-serif;font-weight:700;
    font-size:clamp(56px,13vw,132px);
    line-height:0.92;letter-spacing:-2px;
  }
  .headline .line{
    display:block;overflow:hidden;padding-bottom:0.08em;
  }
  .headline .ch{
    display:inline-block;
    background:linear-gradient(100deg, var(--ice) 20%, var(--frost) 45%, var(--ice) 60%, var(--frost) 85%);
    background-size:250% 100%;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    opacity:0;transform:translateY(60%) rotateX(45deg);
    animation:letter-in .7s cubic-bezier(.16,1,.3,1) forwards, shimmer 5s linear 2.6s infinite;
  }
  .headline .ch.space{width:0.32em;}

  @keyframes letter-in{
    to{opacity:1;transform:translateY(0) rotateX(0);}
  }
  @keyframes shimmer{
    0%{background-position:200% 0;}
    100%{background-position:-50% 0;}
  }
  @keyframes rise{to{opacity:1;transform:translateY(0);}}

  .sub{
    margin-top:22px;
    font-family:'Inter',sans-serif;font-size:15px;color:var(--mist);
    max-width:420px;line-height:1.6;
    opacity:0;transform:translateY(10px);
    animation:rise .8s cubic-bezier(.16,1,.3,1) 1.1s forwards;
  }
  .sub strong{color:var(--ice);font-weight:600;}

  .links{
    display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
    margin-top:42px;
    opacity:0;transform:translateY(10px);
    animation:rise .8s cubic-bezier(.16,1,.3,1) 1.22s forwards;
  }
  .btn{
    font-family:'JetBrains Mono',monospace;font-size:12.5px;padding:14px 24px;border-radius:9px;
    text-decoration:none;color:var(--ice);border:1px solid var(--line);
    transition:transform .25s cubic-bezier(.16,1,.3,1), border-color .25s ease, background .25s ease, box-shadow .25s ease;
    display:inline-flex;align-items:center;gap:8px;position:relative;overflow:hidden;isolation:isolate;
  }
  .btn::before{
    content:"";position:absolute;inset:0;z-index:-1;
    background:radial-gradient(circle at 50% 120%, rgba(127,214,255,0.5), transparent 60%);
    opacity:0;transform:scale(0.4);
    transition:opacity .4s ease, transform .5s cubic-bezier(.16,1,.3,1);
  }
  .btn:hover::before, .btn:focus-visible::before{opacity:1;transform:scale(1);}
  .btn-primary{background:linear-gradient(135deg, var(--frost), var(--frost-2));color:#04101f;font-weight:700;border-color:transparent;}
  .btn-primary:hover{box-shadow:0 10px 34px -8px rgba(127,214,255,.55);transform:translateY(-2px);}
  .btn-ghost{color:var(--mist);background:rgba(255,255,255,0.02);}
  .btn-ghost:hover{color:var(--ice);border-color:var(--mist-dim);background:rgba(255,255,255,.04);transform:translateY(-2px);}

  .foot{
    margin-top:38px;
    font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.5px;color:var(--mist-dim);
    opacity:0;
    animation:rise .8s cubic-bezier(.16,1,.3,1) 1.34s forwards;
  }

  /* ice-shatter intro overlay */
  #shatter{
    position:fixed;inset:0;z-index:100;
    pointer-events:auto;
  }
  #shatter .shard{
    position:absolute;
    background:linear-gradient(135deg, rgba(127,214,255,0.16), rgba(24,77,120,0.22));
    border:1px solid rgba(127,214,255,0.35);
    box-shadow:inset 0 0 24px rgba(127,214,255,0.08);
    transition:transform 1.05s cubic-bezier(.5,0,.35,1), opacity 1.05s ease;
    will-change:transform, opacity;
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
    #shatter{display:none;}
    .headline .ch{opacity:1;transform:none;}
  }

  @media(max-width:520px){
    .stage{padding:40px 20px;}
    .avatar-ring{width:104px;height:104px;}
    .frost-svg{width:180vw;}
  }
</style>
</head>

<script>
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ---------- headline letter reveal ---------- */
  (function buildHeadline(){
    document.querySelectorAll('.headline .line').forEach((lineEl, li) => {
      const word = lineEl.dataset.word;
      [...word].forEach((ch, i) => {
        const span = document.createElement('span');
        span.className = 'ch' + (ch === ' ' ? ' space' : '');
        span.textContent = ch === ' ' ? '\u00A0' : ch;
        const delay = 1.0 + (li * word.length * 0.035) + (i * 0.035);
        span.style.animationDelay = delay.toFixed(3) + 's, ' + (delay + 1.6).toFixed(3) + 's';
        lineEl.appendChild(span);
      });
    });
  })();

  /* ---------- ice-shatter intro ---------- */
  (function shatterIntro(){
    const flash = document.getElementById('impactFlash');
    if (reduceMotion){ return; }
    const wrap = document.getElementById('shatter');
    const cols = 7, rows = 5;
    const cw = 100 / cols, ch = 100 / rows;
    const cx = 50, cy = 50;
    const shards = [];
    let maxDelay = 0;

    for (let r = 0; r < rows; r++){
      for (let c = 0; c < cols; c++){
        const shard = document.createElement('div');
        shard.className = 'shard';
        const left = c * cw, top = r * ch;
        const jitter = 3;
        const x1 = Math.max(0, left - jitter + Math.random()*jitter);
        const y1 = Math.max(0, top - jitter + Math.random()*jitter);
        shard.style.left = x1 + '%';
        shard.style.top = y1 + '%';
        shard.style.width = (cw + jitter) + '%';
        shard.style.height = (ch + jitter) + '%';

        const midX = left + cw/2, midY = top + ch/2;
        const dx = (midX - cx) / 50;
        const dy = (midY - cy) / 50;
        const dist = Math.sqrt(dx*dx + dy*dy) || 0.001;
        const travel = 60 + Math.random() * 90;
        const tx = (dx / dist) * travel;
        const ty = (dy / dist) * travel;
        const rot = (Math.random() - 0.5) * 70;
        const delay = (dist * 90) + Math.random() * 160;
        maxDelay = Math.max(maxDelay, delay);

        shard.style.transitionDelay = delay + 'ms';
        shards.push({ el: shard, tx, ty, rot });
        wrap.appendChild(shard);
      }
    }

    requestAnimationFrame(() => {
      setTimeout(() => {
        flash.classList.add('go');
        shards.forEach(s => {
          s.el.style.transform = `translate(${s.tx}%, ${s.ty}%) rotate(${s.rot}deg) scale(0.6)`;
          s.el.style.opacity = '0';
        });
        setTimeout(() => { wrap.style.pointerEvents = 'none'; wrap.style.display = 'none'; }, 1500);
      }, 250);
    });
  })();

  /* ---------- avatar tilt + idle float toggle ---------- */
  (function avatarInteract(){
    const ring = document.getElementById('avatarRing');
    if (reduceMotion){ return; }

    ring.addEventListener('mouseenter', () => { ring.style.animationPlayState = 'paused'; });
    ring.addEventListener('mousemove', (e) => {
      const r = ring.getBoundingClientRect();
      const px = (e.clientX - r.left) / r.width - 0.5;
      const py = (e.clientY - r.top) / r.height - 0.5;
      ring.style.transform = `translateY(0) rotateY(${px * 26}deg) rotateX(${-py * 26}deg) scale(1.05)`;
    });
    ring.addEventListener('mouseleave', () => {
      ring.style.transform = '';
      ring.style.animationPlayState = 'running';
    });

    function burstAt(cx, cy){
      const n = 26;
      for (let i = 0; i < n; i++){
        const angle = (Math.PI * 2 * i) / n + Math.random() * 0.3;
        const speed = 2 + Math.random() * 3;
        bursts.push({
          x: cx, y: cy,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 1,
          r: Math.random() * 2 + 1,
        });
      }
    }
    ring.addEventListener('click', () => {
      const r = ring.getBoundingClientRect();
      burstAt(r.left + r.width/2, r.top + r.height/2);
    });
    ring.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' '){
        e.preventDefault();
        const r = ring.getBoundingClientRect();
        burstAt(r.left + r.width/2, r.top + r.height/2);
      }
    });
  })();

  /* ---------- parallax depth ---------- */
  const baseGlow = document.getElementById('baseGlow');
  const frostSvg = document.getElementById('frostSvg');
  let targetPX = 0, targetPY = 0, curPX = 0, curPY = 0;
  window.addEventListener('pointermove', (e) => {
    targetPX = (e.clientX / window.innerWidth - 0.5);
    targetPY = (e.clientY / window.innerHeight - 0.5);
  });

  /* ---------- ambient motes + cursor frost trail + click bursts ---------- */
  const canvas = document.getElementById('fx-canvas');
  const ctx = canvas.getContext('2d');
  let w, h, motes, trail = [], bursts = [];

  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    const count = Math.min(90, Math.floor((w * h) / 16000));
    motes = Array.from({length: count}, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      r: Math.random() * 1.6 + 0.4,
      vy: Math.random() * 0.35 + 0.08,
      vx: (Math.random() - 0.5) * 0.15,
      a: Math.random() * 0.5 + 0.2,
    }));
  }
  window.addEventListener('resize', resize);
  resize();

  window.addEventListener('pointermove', (e) => {
    trail.push({ x: e.clientX, y: e.clientY, life: 1 });
    if (trail.length > 40) trail.shift();
  });

  function tick(){
    ctx.clearRect(0, 0, w, h);

    if (!reduceMotion){
      curPX += (targetPX - curPX) * 0.06;
      curPY += (targetPY - curPY) * 0.06;
      baseGlow.style.transform = `translate(${-curPX * 40}px, ${-curPY * 30}px)`;
      frostSvg.style.transform = `translate(calc(-50% + ${curPX * 22}px), calc(-52% + ${curPY * 18}px))`;
    }

    // cursor frost trail
    for (let i = 0; i < trail.length; i++) trail[i].life -= 0.028;
    trail = trail.filter(p => p.life > 0);
    for (let i = 0; i < trail.length - 1; i++){
      const a = trail[i], b = trail[i+1];
      const dx = a.x - b.x, dy = a.y - b.y;
      if (Math.sqrt(dx*dx + dy*dy) > 90) continue;
      ctx.strokeStyle = `rgba(127,214,255,${Math.min(a.life, b.life) * 0.5})`;
      ctx.lineWidth = 1.1;
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
    }
    trail.forEach(p => {
      ctx.beginPath();
      ctx.fillStyle = `rgba(238,246,255,${p.life * 0.6})`;
      ctx.arc(p.x, p.y, 1.3, 0, Math.PI * 2);
      ctx.fill();
    });

    // click bursts — frost shards flying outward
    bursts.forEach(b => {
      b.x += b.vx; b.y += b.vy;
      b.vx *= 0.96; b.vy *= 0.96;
      b.life -= 0.02;
    });
    bursts = bursts.filter(b => b.life > 0);
    bursts.forEach(b => {
      ctx.beginPath();
      ctx.fillStyle = `rgba(127,214,255,${b.life * 0.8})`;
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    });

    // ambient drifting motes
    motes.forEach(m => {
      m.y += m.vy;
      m.x += m.vx;
      if (m.y > h + 4){ m.y = -4; m.x = Math.random() * w; }
      if (m.x < -4) m.x = w + 4;
      if (m.x > w + 4) m.x = -4;
      ctx.beginPath();
      ctx.fillStyle = `rgba(160,215,255,${m.a})`;
      ctx.arc(m.x, m.y, m.r, 0, Math.PI * 2);
      ctx.fill();
    });

    requestAnimationFrame(tick);
  }
  tick();
</script>
