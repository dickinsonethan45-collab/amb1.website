<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amblock — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#05080f;
    --bg-panel:#0c1220;
    --bg-panel-2:#0f1727;
    --line:#182238;
    --line-bright:#26344c;
    --grey:#8fa0ba;
    --grey-dim:#48566e;
    --ice:#eef3fa;
    --blue:#3d7fff;
    --blue-bright:#6fa8ff;
    --cyan:#35e0ff;
    --amber:#ff9d3d;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--ice);
    font-family:'Inter',sans-serif;
    overflow-x:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    padding:32px;
  }
  ::selection{background:var(--blue);color:#04101f;}

  .grid-bg{
    position:fixed;inset:0;z-index:0;
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:56px 56px;
    opacity:0.22;
    -webkit-mask-image:radial-gradient(ellipse 65% 55% at 50% 40%, #000 20%, transparent 100%);
    mask-image:radial-gradient(ellipse 65% 55% at 50% 40%, #000 20%, transparent 100%);
    pointer-events:none;
  }
  .glow{
    position:fixed;top:8%;left:50%;transform:translateX(-50%);
    width:900px;height:900px;
    background:radial-gradient(circle, rgba(61,127,255,0.16) 0%, transparent 68%);
    z-index:0;pointer-events:none;
  }
  canvas#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

  .wrap{
    position:relative;z-index:2;
    width:100%;max-width:620px;
    display:flex;flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .avatar-wrap{
    width:88px;height:88px;border-radius:20px;padding:3px;
    background:linear-gradient(150deg, var(--cyan), var(--blue) 65%);
    box-shadow:0 20px 50px -18px rgba(61,127,255,0.55);
    margin-bottom:26px;
    opacity:0;transform:translateY(14px);
    animation:rise .7s cubic-bezier(.16,1,.3,1) forwards;
  }
  .avatar-wrap img{width:100%;height:100%;border-radius:17px;object-fit:cover;display:block;}

  .eyebrow{
    font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--cyan);
    letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;
    display:flex;align-items:center;gap:8px;
    opacity:0;transform:translateY(14px);
    animation:rise .7s cubic-bezier(.16,1,.3,1) .08s forwards;
  }
  .eyebrow .pip{width:6px;height:6px;border-radius:50%;background:var(--cyan);box-shadow:0 0 10px var(--cyan);animation:pulse 2.2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}

  h1{
    font-family:'JetBrains Mono',monospace;font-weight:800;
    font-size:clamp(40px,11vw,72px);letter-spacing:-2px;line-height:1;
    background:linear-gradient(180deg,#ffffff 0%, var(--blue-bright) 55%, var(--blue) 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    margin-bottom:14px;
    opacity:0;transform:translateY(14px);
    animation:rise .7s cubic-bezier(.16,1,.3,1) .16s forwards;
  }

  @keyframes rise{to{opacity:1;transform:translateY(0);}}

  .coming-soon{
    font-family:'JetBrains Mono',monospace;font-weight:700;
    font-size:clamp(20px,4.2vw,30px);letter-spacing:6px;
    color:var(--cyan);text-shadow:0 0 24px rgba(53,224,255,0.35);
    margin-bottom:44px;
    opacity:0;transform:translateY(14px);
    animation:rise .7s cubic-bezier(.16,1,.3,1) .24s forwards;
  }

  .links{
    display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:34px;
    opacity:0;transform:translateY(14px);
    animation:rise .7s cubic-bezier(.16,1,.3,1) .4s forwards;
  }
  .btn{
    font-family:'JetBrains Mono',monospace;font-size:12.5px;padding:13px 22px;border-radius:8px;
    text-decoration:none;color:var(--ice);border:1px solid var(--line);
    transition:transform .25s cubic-bezier(.16,1,.3,1), border-color .25s ease, background .25s ease, box-shadow .25s ease;
    display:inline-flex;align-items:center;gap:8px;
  }
  .btn-primary{background:var(--blue);color:#04101f;font-weight:700;border-color:var(--blue);}
  .btn-primary:hover{background:var(--blue-bright);box-shadow:0 8px 30px -6px rgba(79,139,255,.55);transform:translateY(-2px);}
  .btn-ghost{color:var(--grey);background:transparent;}
  .btn-ghost:hover{color:var(--ice);border-color:var(--grey-dim);background:rgba(255,255,255,.03);transform:translateY(-2px);}

  .footnote{
    margin-top:30px;font-family:'JetBrains Mono',monospace;font-size:11.5px;color:var(--grey-dim);
    opacity:0;animation:rise .7s cubic-bezier(.16,1,.3,1) .48s forwards;
  }

  @media(max-width:520px){
    body{padding:20px;}
    .term-body{font-size:12px;}
  }
</style>
</head>

<script>
  // ambient particle network, same DNA as the main site but quieter
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let w, h, particles;

  function resize(){
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    const count = Math.min(42, Math.floor(w / 34));
    particles = Array.from({length: count}, () => ({
      x: Math.random() * w,
      y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.2,
      vy: (Math.random() - 0.5) * 0.2,
    }));
  }
  window.addEventListener('resize', resize);
  resize();

  function tick(){
    ctx.clearRect(0, 0, w, h);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0 || p.x > w) p.vx *= -1;
      if (p.y < 0 || p.y > h) p.vy *= -1;
    });
    for (let i = 0; i < particles.length; i++){
      for (let j = i + 1; j < particles.length; j++){
        const a = particles[i], b = particles[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 140){
          ctx.strokeStyle = `rgba(79,139,255,${(1 - dist/140) * 0.12})`;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }
    particles.forEach(p => {
      ctx.fillStyle = 'rgba(111,168,255,0.4)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 1.4, 0, Math.PI * 2);
      ctx.fill();
    });
    requestAnimationFrame(tick);
  }
  tick();

</script>
